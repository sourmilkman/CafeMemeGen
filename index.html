<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b0a">
  <meta name="description" content="Fast local-first prompt builder for M&S Cafe cartoon memes.">
  <title>CafeMeme</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=5">
  <script src="build-info.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-mark" aria-hidden="true">M</div>
      <div><h1>CafeMeme</h1><p>Private prompt studio</p><p id="buildStatus">Build pending</p></div>
    </header>
    <main id="app" class="app-main" tabindex="-1"></main>
    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-item active" type="button" data-route="builder"><span class="nav-icon">✦</span><span>Builder</span></button>
      <button class="nav-item" type="button" data-route="library"><span class="nav-icon">☷</span><span>Library</span></button>
      <button class="nav-item" type="button" data-route="prompt"><span class="nav-icon">⌁</span><span>Prompt</span></button>
      <button class="nav-item" type="button" data-route="settings"><span class="nav-icon">●</span><span>Settings</span></button>
    </nav>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=5" type="module"></script>
</body>
</html>
